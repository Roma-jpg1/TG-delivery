services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tg_delivery
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tg_delivery"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    environment:
      APP_ROLE: api
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/tg_delivery?sslmode=disable
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    environment:
      APP_ROLE: worker
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/tg_delivery?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
