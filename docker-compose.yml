services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tg_delivery
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tg_delivery"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    environment:
      APP_ROLE: api
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/tg_delivery?sslmode=disable
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    environment:
      APP_ROLE: worker
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/tg_delivery?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  website:
    image: node:22
    working_dir: /app
    volumes:
      - ./frontend/miniapp:/app
    environment:
      VITE_API_BASE: http://localhost:18080/api/v1
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started

  admin:
    image: node:22
    working_dir: /app
    volumes:
      - ./frontend/admin:/app
    environment:
      VITE_API_BASE: http://localhost:18080/api/v1/admin
      VITE_ADMIN_TOKEN: dev-admin-token
    command: sh -c "npm install && npm run dev"
    ports:
      - "5174:5174"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
